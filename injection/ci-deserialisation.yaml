rules:
  - id: ci-deserialisation
    severity: ERROR
    languages: [php]
    min-version: 1.71.0
    message: >-
      User-controlled input flows into an unserialize/yaml_parse call,
      enabling arbitrary object instantiation (POP gadget chains) or code
      execution. Use JSON for data exchange, or validate the input
      structure strictly.
    mode: taint
    options:
      taint_assume_safe_booleans: true
      taint_assume_safe_numbers: true
    metadata:
      category: security
      cwe:
        - "CWE-502: Deserialization of Untrusted Data"
      owasp:
        - "A08:2021 - Software and Data Integrity Failures"
      technology:
        - codeigniter
        - php
      confidence: HIGH
      likelihood: HIGH
      impact: HIGH
      subcategory:
        - vuln
      functional-categories:
        - web::source::http-params::codeigniter
        - web::source::cookie::codeigniter
        - deserialization::sink::unserialize::codeigniter
      license: Semgrep Rules License v1.0. For more details, visit semgrep.dev/legal/rules-license
    pattern-sources:
      - label: CI_INPUT
        patterns:
          - pattern-inside: function $FN(..., \CodeIgniter\HTTP\IncomingRequest $REQ, ...) {...}
          - pattern: $REQ->$METHOD(...)
      - label: CI_INPUT
        patterns:
          - pattern-inside: function $FN(..., IncomingRequest $REQ, ...) {...}
          - pattern: $REQ->$METHOD(...)
      - label: CI_INPUT
        pattern: service('request')
      - label: CI_INPUT
        patterns:
          - pattern: public function $METHOD(..., $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., int $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., ?int $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., float $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., ?float $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., bool $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., ?bool $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., \CodeIgniter\HTTP\IncomingRequest $ARG, ...) { ... }
          - pattern-not: public function $METHOD(..., IncomingRequest $ARG, ...) { ... }
          - focus-metavariable: $ARG
          - pattern-inside: class $C extends \App\Controllers\BaseController { ... }
      - label: CI_INPUT
        patterns:
          - pattern: $this->input
          - pattern-inside: class $C extends CI_Controller { ... }
      - label: CI_INPUT
        pattern-either:
          - pattern: $_GET
          - pattern: $_POST
          - pattern: $_COOKIE
          - pattern: $_REQUEST
    pattern-propagators:
      - pattern: $A . $B
        from: $B
        to: $A
    pattern-sinks:
      - requires: CI_INPUT
        patterns:
          - pattern-either:
              - pattern: unserialize($DATA, ...)
              - pattern: yaml_parse($DATA)
              - pattern: yaml_parse_file($DATA)
          - pattern-not: unserialize("...", ...)
          - pattern-not: unserialize('...', ...)
          - pattern-not: yaml_parse("...")
          - pattern-not: yaml_parse_file("...")
